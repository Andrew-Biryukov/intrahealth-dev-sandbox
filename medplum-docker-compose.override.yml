services:
  medplum-server:
    healthcheck:
      # Start probing early to catch the moment migrations finish
      start_period: 30s 
      # Frequent checks (every 15s) minimize wait time for dependent services or readiness status
      interval: 15s
      # 60 retries * 15s = 15-minute total grace period for the first-run database setup
      retries: 60
      timeout: 10s
